  <line x1="55" y1="604" x2="55" y2="634" stroke="#276749" stroke-width="1.8"/>
  <text x="68" y="614" font-size="9" fill="#2D3748">① Update turnaround: 4–24 hrs → &lt;2 hrs (approx. 90% reduction)</text>
  <text x="68" y="628" font-size="9" fill="#2D3748">② Catalogue Manager time on updates: ~4 hrs/week → ~30 min/week (approx. 87% reduction)</text>
  <line x1="510" y1="604" x2="510" y2="634" stroke="#9AE6B4" stroke-width="1"/>
  <text x="523" y="614" font-size="9" fill="#2D3748">③ Manual data entry touchpoints: 3× per change → 1× (auto-propagated to all systems)</text>
  <text x="523" y="628" font-size="9" fill="#2D3748">④ Price change approval audit: none → full timestamped log in SharePoint</text>
  <line x1="900" y1="604" x2="900" y2="634" stroke="#9AE6B4" stroke-width="1"/>
  <text x="913" y="614" font-size="9" fill="#2D3748">⑤ Channel sync reliability: ~70% → ~100%</text>
  <text x="913" y="628" font-size="9" fill="#2D3748">⑥ Staff info lag: 24–72 hrs → real-time</text>
  <text x="1204" y="654" text-anchor="end" font-size="7.5" fill="#A0AEC0">A. Chowdhury  ·  v1.2  ·  Mar 2026  ·  FS-01</text>
