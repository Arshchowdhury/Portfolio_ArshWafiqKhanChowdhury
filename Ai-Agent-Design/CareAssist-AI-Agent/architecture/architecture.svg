  <text x="52" y="534" text-anchor="middle" font-size="9" font-weight="700" fill="white">1</text>
  <text x="68" y="526" font-size="9" font-weight="600" fill="#374151">Staff submits incident in plain language via Teams</text>
  <text x="68" y="539" font-size="8.5" fill="#9CA3AF">Copilot Studio captures mandatory fields through guided conversation</text>
  <circle cx="472" cy="530" r="10" fill="#0078D4"/>
